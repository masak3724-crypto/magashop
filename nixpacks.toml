# Railway / Nixpacks — ModaStyle (Laravel 13)
# Symfony 8 / Laravel 13.9+ требуют PHP >= 8.4

[variables]
NIXPACKS_PHP_VERSION = "8.4"
# Валидный URL на этапе сборки (в Variables Railway не подставляйте ${{...}} в APP_URL)
APP_URL = "http://localhost"
# Только для package:discover на этапе сборки
APP_KEY = "base64:ZmFrZWtleWZvcmJ1aWxkb25seTEyMzQ1Njc4OTBhYmNkZWZnaGlq"

[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "php84Extensions.gd",
  "php84Extensions.pdo",
  "php84Extensions.pdo_pgsql",
  "php84Extensions.mbstring",
  "php84Extensions.curl",
  "php84Extensions.openssl",
  "php84Extensions.fileinfo",
  "php84Extensions.zip",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.bcmath",
]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
  "sh railway/clear-cache.sh",
  "php artisan package:discover --no-interaction",
]

[start]
cmd = "sh railway/start.sh"
