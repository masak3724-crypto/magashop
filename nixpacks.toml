# Railway / Nixpacks — ModaStyle (Laravel 13)
# Symfony 8 / Laravel 13.9+ требуют PHP >= 8.4

[variables]
NIXPACKS_PHP_VERSION = "8.4"
APP_URL = "http://localhost"

[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "php84Extensions.gd",
  "php84Extensions.pdo",
  "php84Extensions.pdo_pgsql",
  "php84Extensions.mbstring",
  "php84Extensions.curl",
  "php84Extensions.openssl",
  "php84Extensions.fileinfo",
  "php84Extensions.zip",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.bcmath",
]

# Отключаем стандартный install (composer install --ignore-platform-reqs с dev-пакетами)
[phases.install]
cmds = ["true"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
]
# package:discover — в pre-deploy (после COPY . /app в образе)

[start]
cmd = "sh railway/start.sh"
